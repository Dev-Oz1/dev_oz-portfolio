<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Admin — Your Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:    #07090f; --bg2: #0b0f18; --bg3: #0f1520;
      --cyan:  #00e5ff; --red: #ff2d55; --green: #00ff88;
      --text:  #b8cfe0; --muted: #3d5266; --border: rgba(0,229,255,.14);
      --gcyan: 0 0 14px rgba(0,229,255,.5), 0 0 40px rgba(0,229,255,.15);
      --gred:  0 0 14px rgba(255,45,85,.55), 0 0 40px rgba(255,45,85,.18);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

    /* SCANLINES */
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:999;opacity:.35}

    /* ── LOGIN SCREEN ── */
    #login-screen {
      position:fixed;inset:0;background:var(--bg);
      display:flex;align-items:center;justify-content:center;z-index:100;
    }
    .login-box {
      width:320px;background:var(--bg2);
      border:1px solid var(--border);padding:2.5rem 2rem;
      position:relative;overflow:hidden;
    }
    .login-box::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    }
    .login-title{
      font-family:'Orbitron',monospace;font-size:1rem;font-weight:900;
      color:#fff;text-align:center;margin-bottom:.4rem;letter-spacing:.05em;
    }
    .login-sub{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:2rem;letter-spacing:.08em}
    .login-input{
      width:100%;background:var(--bg3);border:1px solid var(--border);
      color:var(--text);font-family:'Exo 2',sans-serif;font-size:.88rem;
      padding:.75rem 1rem;margin-bottom:.8rem;outline:none;
      transition:border-color .2s;
    }
    .login-input:focus{border-color:var(--cyan)}
    .login-input::placeholder{color:var(--muted)}
    .login-btn{
      width:100%;background:var(--cyan);border:none;
      font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;
      letter-spacing:.15em;color:var(--bg);padding:.8rem;
      cursor:pointer;transition:opacity .2s,box-shadow .2s;
    }
    .login-btn:hover{opacity:.9;box-shadow:var(--gcyan)}
    .login-error{font-size:.72rem;color:var(--red);margin-top:.6rem;text-align:center;min-height:1rem}

    /* ── MAIN LAYOUT ── */
    #app{display:none;height:100vh;flex-direction:column}
    #app.visible{display:flex}

    /* TOPBAR */
    #topbar{
      background:rgba(7,9,15,.95);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:.7rem 1.5rem;display:flex;align-items:center;
      gap:1rem;flex-shrink:0;
    }
    .topbar-logo{
      font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;
      color:var(--cyan);text-shadow:var(--gcyan);letter-spacing:.1em;
    }
    .topbar-logo span{color:var(--red)}
    .topbar-status{
      display:flex;align-items:center;gap:.4rem;
      font-size:.65rem;color:var(--muted);
      font-family:'Orbitron',monospace;letter-spacing:.08em;margin-left:auto;
    }
    .status-dot{
      width:8px;height:8px;border-radius:50%;background:var(--green);
      box-shadow:0 0 6px rgba(0,255,136,.8);
      animation:sdp 2s ease-in-out infinite;
    }
    @keyframes sdp{0%,100%{opacity:1}50%{opacity:.3}}
    .logout-btn{
      font-family:'Orbitron',monospace;font-size:.58rem;font-weight:700;
      letter-spacing:.1em;color:var(--red);border:1px solid rgba(255,45,85,.35);
      background:transparent;padding:.35rem .8rem;cursor:pointer;
      transition:all .2s;
    }
    .logout-btn:hover{background:rgba(255,45,85,.1);box-shadow:var(--gred)}

    /* MAIN CONTENT */
    #main{display:flex;flex:1;overflow:hidden}

    /* SESSION LIST */
    #session-list{
      width:280px;flex-shrink:0;
      background:var(--bg2);border-right:1px solid var(--border);
      display:flex;flex-direction:column;overflow:hidden;
    }
    .sl-header{
      padding:.9rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .sl-title{
      font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;
      color:var(--cyan);letter-spacing:.2em;text-shadow:var(--gcyan);
    }
    .sl-count{font-size:.6rem;color:var(--muted);margin-top:.2rem}
    #sessions{flex:1;overflow-y:auto}
    #sessions::-webkit-scrollbar{width:3px}
    #sessions::-webkit-scrollbar-thumb{background:rgba(0,229,255,.2)}
    .session-item{
      padding:.85rem 1rem;border-bottom:1px solid rgba(0,229,255,.06);
      cursor:pointer;transition:background .2s;position:relative;
    }
    .session-item:hover{background:rgba(0,229,255,.04)}
    .session-item.active{background:rgba(0,229,255,.08);border-left:2px solid var(--cyan)}
    .si-name{
      font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;
      color:#fff;margin-bottom:.25rem;
    }
    .si-preview{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .si-time{font-size:.58rem;color:var(--muted);margin-top:.2rem;font-family:'Orbitron',monospace}
    .si-unread{
      position:absolute;top:.85rem;right:.85rem;
      background:var(--red);color:#fff;
      font-family:'Orbitron',monospace;font-size:.55rem;font-weight:700;
      width:18px;height:18px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 8px rgba(255,45,85,.7);
    }
    .no-sessions{
      padding:2rem 1rem;text-align:center;
      font-size:.72rem;color:var(--muted);
      font-family:'Orbitron',monospace;letter-spacing:.08em;line-height:1.8;
    }

    /* CHAT AREA */
    #chat-area{
      flex:1;display:flex;flex-direction:column;overflow:hidden;
      background:var(--bg);
    }
    #chat-header{
      padding:.85rem 1.5rem;
      background:var(--bg2);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:.8rem;flex-shrink:0;
    }
    .ch-name{font-family:'Orbitron',monospace;font-size:.82rem;font-weight:700;color:#fff}
    .ch-session{font-size:.62rem;color:var(--muted);margin-top:.15rem;font-family:'Orbitron',monospace}
    .ch-actions{margin-left:auto;display:flex;gap:.5rem}
    .ch-btn{
      font-family:'Orbitron',monospace;font-size:.55rem;font-weight:700;
      letter-spacing:.1em;padding:.35rem .75rem;border:1px solid;
      background:transparent;cursor:pointer;transition:all .2s;
    }
    .ch-btn.resolve{color:var(--green);border-color:rgba(0,255,136,.3)}
    .ch-btn.resolve:hover{background:rgba(0,255,136,.08)}

    #chat-messages{
      flex:1;overflow-y:auto;padding:1.2rem 1.5rem;
      display:flex;flex-direction:column;gap:.7rem;
    }
    #chat-messages::-webkit-scrollbar{width:4px}
    #chat-messages::-webkit-scrollbar-thumb{background:rgba(0,229,255,.2);border-radius:2px}

    .msg-row{display:flex;flex-direction:column;max-width:70%}
    .msg-row.visitor{align-self:flex-start;align-items:flex-start}
    .msg-row.owner{align-self:flex-end;align-items:flex-end}
    .msg-bubble{
      padding:.65rem .95rem;font-size:.84rem;
      line-height:1.5;word-break:break-word;
    }
    .visitor .msg-bubble{
      background:rgba(0,229,255,.09);border:1px solid rgba(0,229,255,.2);
      color:#c9d8e8;border-radius:12px 12px 12px 2px;
    }
    .owner .msg-bubble{
      background:rgba(255,45,85,.08);border:1px solid rgba(255,45,85,.2);
      color:#e8c0c8;border-radius:12px 12px 2px 12px;
    }
    .msg-meta{
      font-size:.6rem;color:var(--muted);margin-top:.2rem;
      font-family:'Orbitron',monospace;letter-spacing:.05em;
    }
    .system-msg{
      text-align:center;font-size:.62rem;
      color:var(--muted);font-family:'Orbitron',monospace;
      letter-spacing:.08em;padding:.3rem 0;
    }

    /* REPLY AREA */
    #reply-area{
      border-top:1px solid var(--border);
      padding:.85rem 1.5rem;
      background:var(--bg2);display:flex;gap:.7rem;flex-shrink:0;
    }
    #reply-text{
      flex:1;background:var(--bg3);border:1px solid var(--border);
      color:var(--text);font-family:'Exo 2',sans-serif;font-size:.85rem;
      padding:.65rem .9rem;outline:none;resize:none;
      min-height:42px;max-height:100px;line-height:1.45;
      transition:border-color .2s;
    }
    #reply-text:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,229,255,.08)}
    #reply-text::placeholder{color:var(--muted)}
    #reply-send{
      background:var(--red);border:none;width:42px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:opacity .2s,box-shadow .2s;flex-shrink:0;
    }
    #reply-send:hover{opacity:.85;box-shadow:var(--gred)}
    #reply-send:disabled{opacity:.3;cursor:not-allowed}
    #reply-send svg{width:16px;height:16px;fill:#fff}

    /* EMPTY STATE */
    #empty-state{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:.8rem;
      color:var(--muted);
    }
    .es-icon{font-size:3rem;opacity:.2}
    .es-text{
      font-family:'Orbitron',monospace;font-size:.7rem;
      letter-spacing:.15em;text-align:center;line-height:1.8;
    }

    @media(max-width:600px){
      #session-list{width:200px}
      #chat-messages{padding:.8rem}
      #reply-area{padding:.7rem .8rem}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">&gt; ADMIN_ACCESS</div>
    <div class="login-sub">// Portfolio Chat Panel</div>
    <input class="login-input" id="login-email" type="email" placeholder="Admin Email"/>
    <input class="login-input" id="login-pass" type="password" placeholder="Password"/>
    <button class="login-btn" onclick="doLogin()">AUTHENTICATE &rarr;</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="topbar">
    <div class="topbar-logo">CHAT<span>.</span>ADMIN</div>
    <div class="topbar-status">
      <div class="status-dot"></div>
      <span id="session-count">0 ACTIVE</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
  </div>

  <div id="main">
    <!-- SESSION LIST -->
    <div id="session-list">
      <div class="sl-header">
        <div class="sl-title">// CONVERSATIONS</div>
        <div class="sl-count" id="sl-count">Loading...</div>
      </div>
      <div id="sessions">
        <div class="no-sessions">No conversations yet.<br/>Waiting for visitors...</div>
      </div>
    </div>

    <!-- CHAT AREA -->
    <div id="chat-area">
      <div id="empty-state">
        <div class="es-icon">&#128172;</div>
        <div class="es-text">SELECT A CONVERSATION<br/>TO START REPLYING</div>
      </div>

      <div id="active-chat" style="display:none;flex-direction:column;height:100%">
        <div id="chat-header">
          <div>
            <div class="ch-name" id="ch-name">Visitor</div>
            <div class="ch-session" id="ch-session"></div>
          </div>
          <div class="ch-actions">
            <button class="ch-btn resolve" onclick="resolveSession()">&#10003; RESOLVE</button>
          </div>
        </div>
        <div id="chat-messages"></div>
        <div id="reply-area">
          <textarea id="reply-text" placeholder="Type your reply... (Enter to send)" rows="1"></textarea>
          <button id="reply-send" disabled>
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- FIREBASE -->
<script src="chat-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
  const chatConfig = window.PORTFOLIO_CHAT_CONFIG || {};
  const firebaseConfig = chatConfig.firebaseConfig || {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL:       "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };
  const ADMIN_NAME = chatConfig.adminName || chatConfig.ownerName || "Admin";
  const hasFirebaseConfig = !!firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY";

  let db = null;
  let auth = null;
  if (hasFirebaseConfig) {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    auth = firebase.auth();
  } else {
    document.getElementById('login-error').textContent = '// CONFIG REQUIRED: update chat-config.js';
  }

  let currentSession = null;
  let msgListener    = null;

  // ── LOGIN ──────────────────────────────────────────────────
  function doLogin() {
    if (!auth) return;
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const err   = document.getElementById('login-error');
    err.textContent = '';
    auth.signInWithEmailAndPassword(email, pass)
      .catch(e => { err.textContent = '// ACCESS DENIED: ' + e.message; });
  }

  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() {
    if (!auth) return;
    auth.signOut();
  }

  if (auth) {
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').classList.add('visible');
        loadSessions();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').classList.remove('visible');
      }
    });
  }

  // ── SESSIONS ───────────────────────────────────────────────
  function loadSessions() {
    db.ref('chats').on('value', snap => {
      const data = snap.val() || {};
      const sessions = Object.entries(data)
        .map(([id, val]) => ({ id, ...val.meta }))
        .filter(s => s.lastTs)
        .sort((a, b) => b.lastTs - a.lastTs);

      const count = sessions.length;
      document.getElementById('sl-count').textContent = count + ' conversation' + (count !== 1 ? 's' : '');
      document.getElementById('session-count').textContent = count + ' ACTIVE';

      const container = document.getElementById('sessions');
      container.innerHTML = '';

      if (!sessions.length) {
        container.innerHTML = '<div class="no-sessions">No conversations yet.<br/>Waiting for visitors...</div>';
        return;
      }

      sessions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'session-item' + (currentSession === s.id ? ' active' : '');
        div.onclick = () => openSession(s.id, s.visitorName || 'Visitor', div);
        const time = s.lastTs ? new Date(s.lastTs).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
        div.innerHTML = `
          <div class="si-name">${esc(s.visitorName || 'Visitor')}</div>
          <div class="si-preview">${esc(s.lastMsg || '')}</div>
          <div class="si-time">${time}</div>
          ${s.unreadOwner ? '<div class="si-unread">!</div>' : ''}
        `;
        container.appendChild(div);
      });
    });
  }

  // ── OPEN SESSION ───────────────────────────────────────────
  function openSession(sessionId, name, clickedEl) {
    currentSession = sessionId;

    // Mark as read
    db.ref(`chats/${sessionId}/meta/unreadOwner`).set(false);

    document.getElementById('empty-state').style.display    = 'none';
    const activeChat = document.getElementById('active-chat');
    activeChat.style.display = 'flex';

    document.getElementById('ch-name').textContent    = name;
    document.getElementById('ch-session').textContent = '// ' + sessionId;

    // Highlight in list
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
    if (clickedEl) clickedEl.classList.add('active');

    // Load messages
    const msgEl = document.getElementById('chat-messages');
    msgEl.innerHTML = '<div class="system-msg">// SESSION LOADED</div>';

    if (msgListener) msgListener.off();
    msgListener = db.ref(`chats/${sessionId}/messages`);

    msgListener.on('child_added', snap => {
      const d = snap.val();
      const row = document.createElement('div');
      row.className = 'msg-row ' + (d.sender === 'owner' ? 'owner' : 'visitor');
      const time = new Date(d.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      row.innerHTML = `
        <div class="msg-bubble">${esc(d.text)}</div>
        <div class="msg-meta">${esc(d.sender === 'owner' ? ADMIN_NAME : (d.name || 'Visitor'))} • ${time}</div>
      `;
      msgEl.appendChild(row);
      msgEl.scrollTop = msgEl.scrollHeight;
    });
  }

  // ── REPLY ──────────────────────────────────────────────────
  const replyText = document.getElementById('reply-text');
  const replySend = document.getElementById('reply-send');

  replyText.addEventListener('input', () => {
    replySend.disabled = replyText.value.trim() === '';
    replyText.style.height = 'auto';
    replyText.style.height = Math.min(replyText.scrollHeight, 100) + 'px';

    // Broadcast typing indicator
    if (currentSession) {
      db.ref(`chats/${currentSession}/ownerTyping`).set(true);
      clearTimeout(window._typingTimer);
      window._typingTimer = setTimeout(() => {
        db.ref(`chats/${currentSession}/ownerTyping`).set(false);
      }, 1500);
    }
  });

  replyText.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
  });

  replySend.addEventListener('click', sendReply);

  function sendReply() {
    const text = replyText.value.trim();
    if (!text || !currentSession) return;
    db.ref(`chats/${currentSession}/messages`).push({
      text, sender: 'owner', name: ADMIN_NAME, ts: Date.now()
    });
    db.ref(`chats/${currentSession}/meta`).update({
      lastMsg: text, lastTs: Date.now(), unreadOwner: false
    });
    db.ref(`chats/${currentSession}/ownerTyping`).set(false);
    replyText.value = ''; replyText.style.height = 'auto';
    replySend.disabled = true;
  }

  // ── RESOLVE ────────────────────────────────────────────────
  function resolveSession() {
    if (!currentSession) return;
    if (!confirm('Mark this conversation as resolved and archive it?')) return;
    db.ref(`chats/${currentSession}/meta/resolved`).set(true);
    db.ref(`chats/${currentSession}/meta/lastMsg`).set('[RESOLVED]');
    currentSession = null;
    document.getElementById('active-chat').style.display = 'none';
    document.getElementById('empty-state').style.display = 'flex';
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
